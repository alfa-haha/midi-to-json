<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDI转JSON工具</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <!-- midi-json-parser 库 -->
    <script>
        // 定义一个函数来加载midi-json-parser库
        function loadMidiParser() {
            return new Promise((resolve, reject) => {
                // 先尝试从CDN加载
                const script = document.createElement('script');
                script.src = "https://unpkg.com/midi-json-parser@4.0.4/build/es5/bundle.min.js";
                script.onload = () => {
                    console.log("midi-json-parser成功从CDN加载");
                    resolve();
                };
                script.onerror = () => {
                    console.warn("无法从CDN加载midi-json-parser，尝试加载备用库");
                    // 如果CDN加载失败，通知用户
                    const statusMessage = document.getElementById('status-message');
                    if (statusMessage) {
                        statusMessage.textContent = "正在尝试加载备用midi-json-parser库...";
                        statusMessage.style.color = '#666';
                    }
                    
                    // 尝试从备用CDN加载
                    const backupScript = document.createElement('script');
                    backupScript.src = "https://cdn.jsdelivr.net/npm/midi-json-parser@4.0.4/build/es5/bundle.min.js";
                    backupScript.onload = () => {
                        console.log("midi-json-parser成功从备用CDN加载");
                        resolve();
                    };
                    backupScript.onerror = () => {
                        console.error("无法从备用CDN加载midi-json-parser库");
                        reject(new Error("无法加载midi-json-parser库，请使用本地服务器运行此应用"));
                    };
                    document.head.appendChild(backupScript);
                };
                document.head.appendChild(script);
            });
        }
    </script>
</head>
<body>
    <header>
        <h1>MIDI转JSON转换工具</h1>
        <p>简单易用的MIDI到Tone.js JSON格式转换器</p>
    </header>

    <main>
        <div class="container">
            <div class="upload-area" id="drop-area">
                <div class="upload-icon">
                    <i class="fas fa-file-upload"></i>
                </div>
                <h3>拖放MIDI文件到这里</h3>
                <p>或者</p>
                <label for="file-input" class="file-input-label">选择MIDI文件</label>
                <input type="file" id="file-input" accept=".mid,.midi" hidden>
                <p class="file-info" id="file-info">未选择文件</p>
            </div>

            <div class="action-buttons">
                <button id="convert-btn" class="btn primary-btn" disabled>转换MIDI</button>
                <button id="download-btn" class="btn secondary-btn" disabled>下载JSON</button>
            </div>

            <div class="conversion-status">
                <div id="status-message"></div>
                <div class="progress-bar-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>基于 <a href="https://github.com/chrisguttandin/midi-json-parser" target="_blank">midi-json-parser</a> 开源库构建</p>
        <p>&copy; 2023 MIDI转JSON工具</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
