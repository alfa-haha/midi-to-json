<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDI to JSON Converter</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <!-- JSZip 库 - 用于批量文件下载 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- FileSaver.js 库 - 用于保存文件 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <!-- midi-json-parser 库 -->
    <script>
        // 定义一个函数来加载midi-json-parser库
        function loadMidiParser() {
            return new Promise((resolve, reject) => {
                // 先尝试从CDN加载
                const script = document.createElement('script');
                script.src = "https://unpkg.com/midi-json-parser@4.0.4/build/es5/bundle.min.js";
                script.onload = () => {
                    console.log("midi-json-parser successfully loaded from CDN");
                    resolve();
                };
                script.onerror = () => {
                    console.warn("Failed to load midi-json-parser from CDN, trying backup library");
                    // 如果CDN加载失败，通知用户
                    const statusMessage = document.getElementById('status-message');
                    if (statusMessage) {
                        statusMessage.textContent = "Trying to load backup midi-json-parser library...";
                        statusMessage.style.color = '#666';
                    }
                    
                    // 尝试从备用CDN加载
                    const backupScript = document.createElement('script');
                    backupScript.src = "https://cdn.jsdelivr.net/npm/midi-json-parser@4.0.4/build/es5/bundle.min.js";
                    backupScript.onload = () => {
                        console.log("midi-json-parser successfully loaded from backup CDN");
                        resolve();
                    };
                    backupScript.onerror = () => {
                        console.error("Failed to load midi-json-parser from backup CDN");
                        reject(new Error("Failed to load midi-json-parser library, please run this app with a local server"));
                    };
                    document.head.appendChild(backupScript);
                };
                document.head.appendChild(script);
            });
        }
    </script>
</head>
<body>
    <header>
        <div class="language-selector">
            <button class="language-btn">
                <i class="fas fa-globe"></i>
                <span id="current-language">English</span>
                <i class="fas fa-chevron-down"></i>
            </button>
            <div class="language-dropdown">
                <div class="language-option active" data-lang="en">
                    <span class="language-name">English</span>
                </div>
                <div class="language-option" data-lang="zh">
                    <span class="language-name">中文</span>
                </div>
                <div class="language-option" data-lang="ja">
                    <span class="language-name">日本語</span>
                </div>
                <div class="language-option" data-lang="es">
                    <span class="language-name">Español</span>
                </div>
                <div class="language-option" data-lang="de">
                    <span class="language-name">Deutsch</span>
                </div>
            </div>
        </div>
        <h1 data-i18n="title">MIDI to JSON Converter</h1>
        <p data-i18n="subtitle">Simple MIDI to Tone.js JSON format converter</p>
    </header>

    <main>
        <div class="container">
            <div class="upload-area" id="drop-area">
                <div class="upload-icon">
                    <i class="fas fa-file-upload"></i>
                </div>
                <h3 data-i18n="dropZoneTitle">Drop MIDI files here</h3>
                <p data-i18n="dropZoneOr">or</p>
                <label for="file-input" class="file-input-label" data-i18n="selectFiles">Select MIDI Files</label>
                <input type="file" id="file-input" accept=".mid,.midi" multiple hidden>
                <p class="file-limit-info" data-i18n="fileLimitInfo"><i class="fas fa-info-circle"></i> For best performance, limit to 20 files (max 100MB total)</p>
                <p class="file-info" id="file-info" data-i18n="noFileSelected">No files selected</p>
            </div>

            <div class="action-buttons">
                <button id="convert-btn" class="btn primary-btn" disabled data-i18n="convertBtn">Convert MIDI</button>
                <button id="download-btn" class="btn secondary-btn" disabled data-i18n="downloadAllBtn">Download All as ZIP</button>
            </div>

            <div class="conversion-status">
                <div id="status-message"></div>
                <div class="progress-bar-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
            </div>

            <div id="batch-status" class="batch-status">
                <div class="batch-header">
                    <h3 data-i18n="batchProcessing">Batch Processing</h3>
                    <div id="batch-progress">
                        <span id="processed-count">0</span>/<span id="total-count">0</span>
                    </div>
                </div>
                <div id="file-list" class="file-list"></div>
            </div>
        </div>
    </main>

    <footer>
        <p data-i18n="footerText">Built with <a href="https://github.com/chrisguttandin/midi-json-parser" target="_blank">midi-json-parser</a> library</p>
        <p>&copy; 2025 MIDI to JSON Converter</p>
    </footer>

    <script src="js/i18n/en.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
